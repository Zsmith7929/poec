# Tier-1 hand-authored one-off transforms. Rules-as-data: edit + revalidate on patch day.
#
# GROUNDING (ADR-0003): every entry here must be a REAL mechanic — self-evidencing from
# a feed, or otherwise verifiable — never authored from recollection. The previous seed
# was fabricated (e.g. "20 Chaos -> Awakener's Orb") and has been deleted.
#
# Bulk grounded transforms do NOT live here — they come from cited metadata via
# expanders (currency vendor recipes: data/metadata/vendor_recipes.yaml). This file is
# only for genuine one-offs that no harvested class covers.
transforms:
  # Flagship shaper-shield case (PRD s2). A real mechanic: plain influenced-base +
  # influence orb -> influenced base. Priced in VERIFY mode via the human-in-the-loop
  # DeepLinkResolver (no fake auto price); ranks provisionally with a trade deep-link.
  # Influence-base pricing is selection-biased (ADR-0004) — surfaced for human judgment.
  - id: shaper_shield_base_influence
    name: "Shaper Titanium Spirit Shield: plain base + Shaper's Orb"
    inputs:
      - {category: BaseType, key: "Titanium Spirit Shield", qty: 1.0, ilvl: 84}
      - {category: Currency, key: "Shaper's Orb", qty: 1.0}
    output:
      {category: BaseType, key: "Titanium Spirit Shield", qty: 1.0,
       influence: shaper, ilvl: 84}
    applicability: >
      Flagship transform (PRD s2). Output is a specific influenced base; poe.ninja's new
      exchange API does not serve base types, so priced via ListingResolver (verify).
    friction: 0.0
    enabled: true
    pricing_mode: verify
