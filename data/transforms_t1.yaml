# Tier-1 hand-authored one-off transforms. Rules-as-data: edit + revalidate on patch day.
#
# GROUNDING (ADR-0003): every entry here must be a REAL mechanic — self-evidencing from
# a feed, or otherwise verifiable — never authored from recollection. The previous seed
# was fabricated (e.g. "20 Chaos -> Awakener's Orb") and has been deleted.
#
# Bulk grounded transforms do NOT live here — they come from cited metadata via
# expanders (currency vendor recipes: data/metadata/vendor_recipes.yaml). This file is
# only for genuine one-offs that no harvested class covers.
transforms:
  # Flagship influenced-base case (PRD s2). A real mechanic: plain base + Conqueror
  # exalt -> single-influence base. Auto-priced from the poe.ninja stash BaseType feed,
  # which carries plain and influenced variants (matched by influence + ilvl). The
  # Conqueror exalts (not the defunct Shaper's/Elder's Orb) are the current influence
  # currency and are in the feed. Base-type pricing is selection-biased (ADR-0004) —
  # surfaced for human judgment, not treated as exact.
  - id: crusader_shield_base_influence
    name: "Crusader Titanium Spirit Shield: plain base + Crusader's Exalted Orb"
    inputs:
      - {category: BaseType, key: "Titanium Spirit Shield", qty: 1.0, ilvl: 84}
      - {category: Currency, key: "Crusader's Exalted Orb", qty: 1.0}
    output:
      {category: BaseType, key: "Titanium Spirit Shield", qty: 1.0,
       influence: crusader, ilvl: 84}
    applicability: >
      Flagship transform (PRD s2): plain Titanium Spirit Shield (ilvl 84) + Crusader's
      Exalted Orb -> Crusader-influenced base. Both base variants come from the ninja
      stash BaseType feed; the exalt from the currency feed.
    friction: 0.0
    enabled: true
    pricing_mode: auto
